<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crosstest picker</title>
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <meta property="og:title" content="Dipsticks Crosstest picker" />
    <meta
      property="og:description"
      content="Creates a random crosstest, can be toggled between legal or not."
    />
    <meta property="og:image" content="https://d1pstlck.github.io/pfp1.jpg" />
    <meta property="og:url" content="Placeholder" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=PT+Sans&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "DM Sans", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: rgb(0, 0, 0);
        background: url("backgif.gif") no-repeat center center fixed;
        background-size: cover;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.5),
          rgba(0, 0, 0, 0.5)
        );
        z-index: 0;
      }

      .card {
        background: rgba(85, 66, 89, 0.44);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        padding: 50px;
        width: 450px;
        position: relative;
        z-index: 1;
        transition: transform 0.5s ease;
        color: #fff;
      }

      .card h1 {
        margin: 10px 0 15px;
        color: #fff;
        font-size: 40px;
      }

      .card {
        margin: 10px 0 15px;
        color: #fff;
        font-size: 20px;
      }

      .card label {
        margin: 10px 0 5px;
        color: #fff;
        font-size: 20px;
      }

      #useList3 {
        margin-bottom: 20px;
      }

      #generate {
        background-color: rgba(85, 66, 89, 0.44);
        filter: blur(0.75px);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        color: #e4e6eb;
        padding: 13px 25px;
        cursor: pointer;
        font-size: 23px;
        text-decoration: none;
        transition: background-color 0.3s;
      }

      #generate:hover {
        filter: blur(0px);
      }

      #result {
        margin-top: 5%;
      }
      .back-button {
        background: rgba(85, 66, 89, 0.44);
        filter: blur(0.75px);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        color: #e4e6eb;
        padding: 10px 20px;
        text-decoration: none;
        font-size: 20px;
        position: absolute;
        top: 0;
        left: 0;
        transform: translate(-2%, -5%);
        transition: background-color 0.3s;
      }

      .back-button:hover {
        filter: blur(0px);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <a href="/scp" class="back-button">Back</a>
      <h1>SCP Crosstest Picker</h1>
      <label for="useList3">Legal</label>
      <input type="checkbox" id="useList3" checked />
      <button id="generate">Generate</button>
      <div id="result"></div>
      <script>
        const list1 = [
          "SCP-999",
          "SCP-714",
          "SCP-207",
          "SCP-1025",
          "SCP-517",
          "SCP-178",
          "SCP-701-1",
          "SCP-008",
          "SCP-403",
          "SCP-173",
          "SCP-035",
          "SCP-409",
          "SCP-049",
          "SCP-096",
          "SCP-017",
          "SCP-2006",
          "SCP-939",
          "SCP-457",
          "SCP-106",
          "SCP-076",
        ];
        const list2 = [
          "SCP-3250",
          "SCP-1193",
          "SCP-860",
          "SCP-999",
          "SCP-120",
          "SCP-1499",
          "SCP-914",
          "SCP-498",
          "SCP-207",
          "SCP-330",
          "SCP-1025",
          "SCP-517",
          "SCP-148",
          "SCP-178",
          "SCP-1139",
          "SCP-087",
          "SCP-224",
          "SCP-902",
          "SCP-701-1",
          "SCP-008",
          "SCP-2059",
          "SCP-403",
          "SCP-173",
          "SCP-093",
          "SCP-035",
          "SCP-409",
          "SCP-2521",
          "SCP-049",
          "SCP-096",
          "SCP-017",
          "SCP-2006",
          "SCP-939",
          "SCP-457",
          "SCP-106",
        ];
        const list3 = [
          "SCP-999",
          "SCP-714",
          "SCP-207",
          "SCP-1025",
          "SCP-517",
          "SCP-148",
          "SCP-178",
          "SCP-1139",
          "SCP-224",
          "SCP-403",
          "SCP-035",
        ];

        function selectRandomWords() {
          const useList3 = document.getElementById("useList3").checked;
          const selectedList1 = useList3 ? list3 : list1;
          const selectedList2 = list2;

          let word1 =
            selectedList1[Math.floor(Math.random() * selectedList1.length)];
          let word2;
          do {
            word2 =
              selectedList2[Math.floor(Math.random() * selectedList2.length)];
          } while (word2 === word1);

          return [word1, word2];
        }

        function displayResult() {
          const [word1, word2] = selectRandomWords();
          const resultDiv = document.getElementById("result");
          resultDiv.innerHTML = `Crosstest: ${word1} and ${word2}`;
        }

        document
          .getElementById("generate")
          .addEventListener("click", displayResult);
      </script>
    </div>

    <script>
      const card = document.querySelector(".card");
      window.addEventListener("mousemove", (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      });
    </script>
  </body>
</html>
